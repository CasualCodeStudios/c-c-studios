<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SunRise Valley Farms</title>
  <link rel="stylesheet" href="signing.css">
</head>
<body>
  <main>
<!-- regiter - Create an account -->
    <div class="auth-wrapper" id="registerWrapper">
      <h1>Create an Account</h1>
    <p>Register to shop with SunRise Valley Farms.</p>
    <form id="registerForm">
      <label for="name">
        Full Name
        <input name="name" type="text" id="name" placeholder="Full Name" required>
      </label>
      <label for="email">
        Email
        <input name="email" type="email" id="email" placeholder="Email" required>
      </label>
      <label for="password">
        Password
        <input name="password" type="password" id="password" placeholder="Password" required>
      </label>
      <button class="submitBtn" type="submit">Create account</button>
    </form>
    <a href="#loginWrapper">Already have an account? Sign In</a>
    </div>

<!-- login - Welcome Back -->
    <div class="auth-wrapper" id="loginWrapper">
      <h1>Welcome Back</h1>
    <p>Sign in to access your cart and order details.</p>
    <form id="loginForm">
      <label for="email">
        Email
        <input name="email" type="email" id="email" placeholder="Email" required>
      </label>
      <label for="password">
        Password
        <input name="password" type="password" id="password" placeholder="Password" required>
      </label>
      <button class="submitBtn" type="submit">Sign In</button>
      
    </form>
    <a href="registerWrapper">Don't have an account? Register</a>
    </div>
  </main>

  <script src = "main.js"></script>
</body>
</html>
