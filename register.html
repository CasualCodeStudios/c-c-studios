<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SunRise Valley Farms</title>
  <link rel="stylesheet" href="mainStyles.css">
  <style>
    body{background: linear-gradient(to bottom, #046607 0%, #023b00 100%); color:#fff;}
    .auth-wrapper{max-width:420px; margin: 100px auto; background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.25); border-radius:12px; padding:24px;}
    h1{margin-bottom:14px;}
    .auth-wrapper form{display:flex; flex-direction:column; gap:12px;}
    .auth-wrapper input{padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color:#fff;}
    .auth-wrapper button{padding:12px; border:none; border-radius:8px; background:#ffd; color:#006400; font-weight:700; cursor:pointer;}
    .auth-wrapper a{color:#ffd; font-size:0.9rem; text-align:center; display:block; margin-top:12px;}
  </style>
</head>
<body>
  <main class="auth-wrapper">
    <h1>Create an Account</h1>
    <p>Register to shop with SunRise Valley Farms.</p>
    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <a href="login.html">Already have an account? Sign In</a>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e){
      e.preventDefault();
      const userName = document.getElementById('name').value;
      localStorage.setItem('sunriseLoggedIn', 'true');
      localStorage.setItem('sunriseUserName', userName);
      alert('Account created and logged in as ' + userName);
      window.location.href = 'shop.html';
    });
  </script>
</body>
</html>
